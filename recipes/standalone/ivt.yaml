---
description: Integrated Vapour Transport
inputs:
  twflux:
    type: expr
    inputs: [viwve, viwvn]
    expr: twflux = (viwve**2+viwvn**2)** 0.5
recipe:
 - step: add_basemap
 - step: add_coastlines_bg
 - step: add_grib
   grib: twflux
 - step: add_contour
   params:
    contour: off
    contour_shade: on
    contour_shade_method: area_fill
    contour_level_selection_type: level_list
    contour_level_list: [250, 300, 350, 400, 450, 500, 600, 700, 800, 900, 1000,
            1250, 2000]
    contour_shade_colour_method: list
    contour_shade_colour_list: [ "#a6bddb", "#74a9cf", "#3690c0", "#a3a891",
            "#bebd65", "#d8d239", "#f3e70b", "#f4c60a", "#f88406", "#fb4103",
            "#ff0000", "#6e3715" ]
    contour_highlight: off
    contour_hilo: off
    legend: on
    legend_title: on
    legend_title_text: 'Integrated Vapour Transport (kg/ms)'
    legend_display_type: continuous
    legend_automatic_position: right
    legend_text_colour: black
    legend_text_font_size: 0.5
    legend_title_font_size: 0.5
 - step: add_grib
   grib: mslp
   params:
    grib_automatic_scaling: off
    grib_scaling_factor: 0.01
 - step: add_contour
   params:
    contour_shade: off
    contour: on
    contour_level_selection_type: interval
    contour_interval: 2
    contour_line_style: solid
    contour_line_colour: black
    contour_reference_level: 1000
    contour_line_thickness: 2
    contour_hilo: on
    contour_hilo_type: text
    contour_lo_colour: blue
    contour_hi_colour: red
    contour_hilo_window_size: 5
    contour_highlight_frequency: 100
    contour_highlight_colour: blue
    contour_label: on
    contour_label_height: 0.4
    contour_label_frequency: 2
    legend: off
 - step: add_grib
   grib: uv950
 - step: add_wind
   params:
     wind_field_type: arrows
     wind_arrow_colour: black
     wind_arrow_head_shape: 0
     wind_arrow_head_ratio: 0.6
     wind_arrow_unit_velocity: 25
     wind_flag_origin_marker: off
     wind_flag_cross_boundary: on
     wind_thinning_method: automatic
     wind_thinning_factor: 1
     legend: on
     legend_title: on
     legend_title_text: 'Integrated Vapour Transport (kg/ms)'
     legend_display_type: continuous
     legend_automatic_position: right
     legend_text_colour: black
     legend_text_font_size: 0.5
     legend_title_font_size: 0.5
 - step: add_coastlines_fg
 - step: add_grid
 - step: add_boundaries
 - step: add_user_boundaries
 - step: add_geopoints
 - step: add_symbols
